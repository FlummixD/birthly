<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Birthly</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="content">
            <form id="inputs">
                <button id="add">
                    <img id="add-icon" src="icons/add.svg" alt="+" />
                </button>
                <input
                    type="text"
                    name="name"
                    id="name"
                    placeholder="Name"
                    required
                />
                <div class="date-wrapper">
                    <input type="date" id="my-date" name="birthday" required />
                    <div class="custom-icon"></div>
                </div>
            </form>
            <div id="title"><h2 id="next-bd">Nächsten Geburtstage:</h2></div>
            <div id="dates"></div>
            <script src="script.js"></script>
        </div>
    </body>
</html>
